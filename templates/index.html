<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Query Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; font-size: 13px;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 10px 20px; }
  header h1 { font-size: 15px; color: #7eb8f7; }

  /* ── 필터 패널 ── */
  .filters {
    background: #13161f; border-bottom: 1px solid #2a2d3e;
    padding: 10px 20px; display: flex; flex-direction: column; gap: 8px;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .fg { display: flex; flex-direction: column; gap: 3px; }
  .fg label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }
  .fg input[type="text"],
  .fg input[type="date"],
  .fg input[type="time"],
  .fg select {
    background: #1e2130; border: 1px solid #2e3148; color: #e0e0e0;
    padding: 5px 8px; border-radius: 4px; font-size: 12px; height: 30px;
    color-scheme: dark;
  }
  .fg input[type="text"] { min-width: 150px; }
  .fg input[type="date"] { min-width: 120px; }
  .fg input[type="time"] { min-width: 72px; }
  .fg select { min-width: 110px; }
  .fg .dt-pair { display: flex; gap: 4px; }
  .fg input:focus, .fg select:focus { outline: none; border-color: #5b7fe0; }

  .presets { display: flex; gap: 4px; }
  .preset-btn {
    padding: 4px 8px; border: 1px solid #2e3148; border-radius: 4px;
    background: #1e2130; color: #aaa; font-size: 11px; cursor: pointer;
  }
  .preset-btn:hover, .preset-btn.active { background: #3d5afe; color: #fff; border-color: #3d5afe; }

  .state-checks { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 2px; }
  .state-checks label { display: flex; align-items: center; gap: 3px; font-size: 12px; cursor: pointer; }
  .state-checks input[type="checkbox"] { accent-color: #3d5afe; cursor: pointer; }

  /* ── 조건 빌더 ── */
  .cond-area { display: flex; flex-direction: row; flex-wrap: wrap; gap: 6px; align-items: center; }
  .cond-row  { display: flex; gap: 4px; align-items: center; }
  .cond-field, .cond-value {
    background: #1e2130; border: 1px solid #2e3148; color: #e0e0e0;
    padding: 5px 8px; border-radius: 4px; font-size: 12px; height: 30px;
  }
  .cond-field { min-width: 80px; }
  .cond-value { min-width: 140px; }
  .cond-field:focus, .cond-value:focus { outline: none; border-color: #5b7fe0; }
  .cond-remove {
    background: none; border: 1px solid #2e3148; color: #666;
    cursor: pointer; font-size: 14px; padding: 0 7px; border-radius: 4px; height: 30px;
  }
  .cond-remove:hover { color: #ef9a9a; border-color: #ef9a9a; }
  .btn-add-cond {
    background: none; border: 1px dashed #3d5afe; color: #7eb8f7;
    cursor: pointer; font-size: 11px; padding: 1px 10px; border-radius: 4px;
    height: 22px; margin-left: 2px;
  }
  .btn-add-cond:hover { background: #1a2a4a; }
  .cond-and-label { font-size: 10px; color: #555; padding: 0 2px; user-select: none; }

  .btn { padding: 5px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; height: 30px; }
  .btn-primary   { background: #3d5afe; color: #fff; }
  .btn-primary:hover { background: #536dfe; }
  .btn-secondary { background: #2a2d3e; color: #aaa; }
  .btn-secondary:hover { background: #363a52; }
  .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

  /* ── 클러스터 탭 ── */
  .cluster-tabs {
    background: #0d0f16; border-bottom: 1px solid #2a2d3e;
    padding: 0 20px; display: flex; gap: 0; overflow-x: auto; align-items: stretch;
  }
  .cluster-tab {
    padding: 8px 16px; font-size: 12px; font-weight: 500; color: #555;
    cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: color .15s; display: flex; align-items: center; gap: 6px;
  }
  .cluster-tab:hover { color: #aaa; }
  .cluster-tab.active { color: #7eb8f7; border-bottom-color: #7eb8f7; }
  .tab-count { font-size: 10px; background: #1e2130; color: #666; padding: 1px 6px; border-radius: 8px; }
  .cluster-tab.active .tab-count { background: #1a2a4a; color: #7eb8f7; }
  .tab-summary { margin-left: auto; padding: 0 4px; font-size: 11px; color: #555; align-self: center; white-space: nowrap; }

  /* ── 테이블 ── */
  .table-wrap { overflow: auto; flex: 1; min-height: 0; }

  /* ── 페이지네이션 ── */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #0d0f16; border-top: 1px solid #2a2d3e;
    padding: 6px 20px; height: 38px;
  }
  .page-btn {
    background: #1e2130; border: 1px solid #2e3148; color: #aaa;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .page-btn:hover:not(:disabled) { background: #3d5afe; color: #fff; border-color: #3d5afe; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 12px; color: #666; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #13161f; color: #888; text-align: left;
    padding: 7px 12px; border-bottom: 2px solid #2a2d3e;
    position: sticky; top: 0; white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th.sortable { color: #aaa; }
  thead th.sortable:hover { color: #e0e0e0; }
  thead th.no-sort { cursor: default; color: #666; }
  thead th.no-sort:hover { color: #666; }
  /* 정렬 가능 표시: 비활성 ↕, 활성 ▲▼ */
  thead th.sortable:not(.sort-asc):not(.sort-desc)::after { content: ' ↕'; font-size: 9px; color: #3d4060; }
  thead th.sort-asc::after  { content: ' ▲'; font-size: 10px; color: #7eb8f7; }
  thead th.sort-desc::after { content: ' ▼'; font-size: 10px; color: #7eb8f7; }

  tbody tr.data-row { border-bottom: 1px solid #1a1d2e; }
  tbody tr.data-row:hover { background: #1c2035; }
  tbody td { padding: 6px 12px; vertical-align: middle; }

  .c-toggle    { width: 32px; text-align: center; padding: 0 4px !important; }
  .c-cluster   { color: #7eb8f7; font-weight: 500; white-space: nowrap; }
  .c-qid       { font-family: monospace; font-size: 11px; color: #666; white-space: nowrap; }
  .c-user      { color: #ce93d8; white-space: nowrap; }
  .c-conn-user { color: #b0bec5; font-size: 12px; white-space: nowrap; }
  .c-dur       { text-align: right; white-space: nowrap; }
  .c-rows      { text-align: right; white-space: nowrap; color: #888; font-size: 12px; }
  .c-time      { white-space: nowrap; color: #888; }
  .c-qstatus   { font-family: monospace; font-size: 11px; color: #ef9a9a; max-width: 480px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .c-stmt { max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stmt-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: monospace; font-size: 12px; color: #ccc;
  }
  .toggle-btn {
    background: none; border: 1px solid #2e3148; color: #666;
    cursor: pointer; font-size: 10px; padding: 1px 5px; border-radius: 3px; line-height: 1.4;
  }
  .toggle-btn:hover { color: #aaa; border-color: #5b7fe0; }
  .toggle-btn.open  { color: #7eb8f7; border-color: #7eb8f7; }

  .s { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .s-FINISHED  { background: #1b5e2066; color: #66bb6a; border: 1px solid #2e7d32; }
  .s-EXCEPTION { background: #b71c1c66; color: #ef9a9a; border: 1px solid #c62828; }
  .s-RUNNING   { background: #0d47a166; color: #90caf9; border: 1px solid #1565c0; }
  .s-QUEUED    { background: #e65100aa; color: #ffcc02; border: 1px solid #e65100; }
  .s-COMPILED  { background: #e6510066; color: #ffb74d; border: 1px solid #e65100; }

  /* ── SQL / 에러 펼침 행 ── */
  tr.detail-row td { background: #0d0f16; padding: 0; border-bottom: 2px solid #2a2d3e; }
  .detail-wrap { padding: 10px 16px; }
  .sql-block {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #a8d8a8; white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    max-height: 260px; overflow-y: auto;
    background: #080a0f; border: 1px solid #1e2130; border-radius: 4px; padding: 10px 12px;
  }
  .err-block {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #ef9a9a; white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    max-height: 120px; overflow-y: auto;
    background: #1a0a0a; border: 1px solid #c6282866; border-radius: 4px;
    padding: 8px 12px; margin-top: 8px;
  }
  .ok-block {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #66bb6a; white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    max-height: 120px; overflow-y: auto;
    background: #0a1a0a; border: 1px solid #2e7d3266; border-radius: 4px;
    padding: 8px 12px; margin-top: 8px;
  }

  .empty   { text-align: center; padding: 60px; color: #555; }
  .loading { text-align: center; padding: 60px; color: #7eb8f7; }
</style>
</head>
<body>

<header><h1>⚡ Query Explorer</h1></header>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>사용자</label>
      <input id="f-user" type="text" placeholder="username">
    </div>
    <div class="fg">
      <label>검색 조건 &nbsp;<button class="btn-add-cond" onclick="addCond()">+ 추가</button></label>
      <div class="cond-area" id="cond-area"></div>
    </div>
    <div class="fg">
      <label>빠른 범위</label>
      <div class="presets">
        <button class="preset-btn active" onclick="setPreset(1,this)">1h</button>
        <button class="preset-btn" onclick="setPreset(6,this)">6h</button>
        <button class="preset-btn" onclick="setPreset(12,this)">12h</button>
        <button class="preset-btn" onclick="setPreset(24,this)">24h</button>
        <button class="preset-btn" onclick="setPreset(72,this)">3d</button>
        <button class="preset-btn" onclick="setPreset(168,this)">7d</button>
        <button class="preset-btn" onclick="setPreset(360,this)">15d</button>
        <button class="preset-btn" onclick="setPreset(720,this)">30d</button>
      </div>
    </div>
    <div class="fg">
      <label>시작 일시</label>
      <div class="dt-pair">
        <input id="f-from-date" type="date" oninput="clearPreset()">
        <input id="f-from-time" type="time" oninput="clearPreset()">
      </div>
    </div>
    <div class="fg">
      <label>종료 일시</label>
      <div class="dt-pair">
        <input id="f-to-date" type="date" oninput="clearPreset()">
        <input id="f-to-time" type="time" oninput="clearPreset()">
      </div>
    </div>
  </div>
  <div class="filter-row">
    <div class="fg">
      <label>클러스터</label>
      <select id="f-cluster">
        <option value="">전체</option>
      </select>
    </div>
    <div class="fg">
      <label>Query Type</label>
      <select id="f-qtype">
        <option value="QUERY" selected>QUERY</option>
        <option value="SET">SET</option>
        <option value="DDL">DDL</option>
        <option value="N/A">N/A</option>
      </select>
    </div>
    <div class="fg">
      <label>결과 수</label>
      <select id="f-limit">
        <option value="100" selected>100건</option>
        <option value="300">300건</option>
        <option value="500">500건</option>
        <option value="1000">1000건</option>
      </select>
    </div>
    <div class="fg" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary" id="btn-search" onclick="search()">검색</button>
        <button class="btn btn-secondary" onclick="reset()">초기화</button>
      </div>
    </div>
  </div>
</div>

<div class="cluster-tabs" id="cluster-tabs">
  <div class="cluster-tab active" data-cluster="" onclick="selectTab(this)">
    전체 <span class="tab-count" id="tab-count-all">-</span>
  </div>
  <span class="tab-summary" id="tab-summary"></span>
</div>

<div class="cluster-tabs" id="state-tabs">
  <div class="cluster-tab active" data-state="" onclick="selectStateTab(this)">
    전체 <span class="tab-count" id="stab-count-all">-</span>
  </div>
  <div class="cluster-tab" data-state="FINISHED" onclick="selectStateTab(this)">
    <span class="s s-FINISHED">FINISHED</span> <span class="tab-count" id="stab-count-FINISHED">-</span>
  </div>
  <div class="cluster-tab" data-state="RUNNING" onclick="selectStateTab(this)">
    <span class="s s-RUNNING">RUNNING</span> <span class="tab-count" id="stab-count-RUNNING">-</span>
  </div>
  <div class="cluster-tab" data-state="EXCEPTION" onclick="selectStateTab(this)">
    <span class="s s-EXCEPTION">EXCEPTION</span> <span class="tab-count" id="stab-count-EXCEPTION">-</span>
  </div>
  <div class="cluster-tab" data-state="COMPILED" onclick="selectStateTab(this)">
    <span class="s s-COMPILED">COMPILED</span> <span class="tab-count" id="stab-count-COMPILED">-</span>
  </div>
</div>

<div class="table-wrap" id="table-wrap">
  <div class="empty">검색 조건을 입력하고 검색하세요</div>
</div>
<div class="pagination" id="pagination"></div>

<script>
let _allRows       = [];
let _rows          = [];
let _sortCol       = 'startTime';
let _sortDir       = -1;
let _activeCluster = '';
let _activeState   = '';
let _openRows      = new Set(); // 펼쳐진 행의 queryId
let _condCount     = 0;
let _page          = 0;
const PAGE_SIZE    = 200;

const COLS = [
  { key: '_toggle',          label: '',              cls: 'c-toggle',    sort: false },
  { key: '_cluster',         label: '클러스터',      cls: 'c-cluster',   sort: true  },
  { key: 'queryId',          label: 'Query ID',      cls: 'c-qid',       sort: false },
  { key: 'user',             label: '사용자',        cls: 'c-user',      sort: true  },
  { key: '_connected_user',  label: 'Connected User',cls: 'c-conn-user', sort: false },
  { key: 'queryState',       label: '상태',          cls: '',            sort: true  },
  { key: 'statement',        label: 'Statement',     cls: 'c-stmt',      sort: false },
  { key: 'durationMillis',   label: '실행시간',      cls: 'c-dur',       sort: false },
  { key: 'rowsProduced',     label: 'Rows',          cls: 'c-rows',      sort: false },
  { key: 'startTime',        label: '시작시간',      cls: 'c-time',      sort: true  },
  { key: 'endTime',          label: '종료시간',      cls: 'c-time',      sort: true  },
  { key: 'queryStatus',      label: 'queryStatus',   cls: 'c-qstatus',   sort: false },
];

window.onload = () => {
  addCond();
  setPreset(1, document.querySelector('.preset-btn.active'));
  loadClusters();
};

function addCond(value) {
  const area = document.getElementById('cond-area');
  const id   = _condCount++;
  const row  = document.createElement('div');
  row.className = 'cond-row';
  row.id        = `cond-row-${id}`;
  const isFirst = area.children.length === 0;
  row.innerHTML = `
    <span class="cond-and-label"${isFirst ? ' style="display:none"' : ''}>AND</span>
    <input class="cond-value" id="cond-val-${id}" type="text"
      placeholder="table, 키워드 등"
      value="${esc(value||'')}">
    <button class="cond-remove" onclick="removeCond(${id})" title="삭제">×</button>`;
  area.appendChild(row);
}

function removeCond(id) {
  const row = document.getElementById(`cond-row-${id}`);
  if (row) row.remove();
}

function getConditions() {
  const conds = [];
  const user = document.getElementById('f-user').value.trim();
  if (user) conds.push({ field: 'user', value: user });
  document.querySelectorAll('#cond-area .cond-row').forEach(row => {
    const inp = row.querySelector('.cond-value');
    if (inp && inp.value.trim())
      conds.push({ field: 'keyword', value: inp.value.trim() });
  });
  return conds;
}

async function loadClusters() {
  try {
    const res  = await fetch('/api/clusters');
    const data = await res.json();
    const sel  = document.getElementById('f-cluster');
    const tabs = document.getElementById('cluster-tabs');
    const summary = document.getElementById('tab-summary');
    data.clusters.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);

      const div = document.createElement('div');
      div.className       = 'cluster-tab';
      div.dataset.cluster = c;
      div.innerHTML       = `${c} <span class="tab-count" id="tab-count-${c}">-</span>`;
      div.onclick         = () => selectTab(div);
      tabs.insertBefore(div, summary);
    });
  } catch(e) {}
}

function selectTab(el) {
  document.querySelectorAll('#cluster-tabs .cluster-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _activeCluster = el.dataset.cluster;
  applyTabFilter();
}

function selectStateTab(el) {
  document.querySelectorAll('#state-tabs .cluster-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _activeState = el.dataset.state;
  applyTabFilter();
}

function applyTabFilter() {
  _rows = _allRows.filter(q => {
    if (_activeCluster && q._cluster !== _activeCluster) return false;
    if (_activeState   && q.queryState !== _activeState)  return false;
    return true;
  });
  _page = 0;
  updateTabCounts();
  renderTable(_rows);
  updateTabSummary();
}

function updateTabCounts() {
  // 클러스터 탭 건수: 현재 상태 필터 기준
  const clusterBase = _activeState ? _allRows.filter(q => q.queryState === _activeState) : _allRows;
  // 상태 탭 건수: 현재 클러스터 필터 기준
  const stateBase   = _activeCluster ? _allRows.filter(q => q._cluster === _activeCluster) : _allRows;

  const clusterCounts = {};
  const stateCounts   = {};
  clusterBase.forEach(q => { clusterCounts[q._cluster] = (clusterCounts[q._cluster] || 0) + 1; });
  stateBase.forEach(q =>   { stateCounts[q.queryState] = (stateCounts[q.queryState] || 0) + 1; });

  document.getElementById('tab-count-all').textContent  = _allRows.length;  // 클러스터 전체: 항상 고정
  document.getElementById('stab-count-all').textContent = stateBase.length; // 상태 전체: 현재 클러스터 기준
  document.querySelectorAll('.cluster-tab[data-cluster]').forEach(tab => {
    const c = tab.dataset.cluster;
    if (!c) return;
    const el = document.getElementById(`tab-count-${c}`);
    if (el) el.textContent = clusterCounts[c] || 0;
  });
  ['FINISHED', 'RUNNING', 'EXCEPTION', 'COMPILED'].forEach(s => {
    const el = document.getElementById(`stab-count-${s}`);
    if (el) el.textContent = stateCounts[s] || 0;
  });
}

function updateTabSummary() {
  const el = document.getElementById('tab-summary');
  if (!el) return;
  if (!_allRows.length) { el.textContent = ''; return; }
  const parts = [];
  if (_activeState)   parts.push(_activeState);
  if (_activeCluster) parts.push(_activeCluster);
  el.textContent = parts.length
    ? `${parts.join(' / ')}: ${_rows.length}건 / 전체 ${_allRows.length}건`
    : `전체 ${_allRows.length}건`;
}

function clearPreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function setPreset(hours, btn) {
  const now  = new Date();
  const from = new Date(now - hours * 3600000);
  const p = n => String(n).padStart(2, '0');
  const dateStr = d => `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  const timeStr = d => `${p(d.getHours())}:${p(d.getMinutes())}`;
  document.getElementById('f-from-date').value = dateStr(from);
  document.getElementById('f-from-time').value = timeStr(from);
  document.getElementById('f-to-date').value   = dateStr(now);
  document.getElementById('f-to-time').value   = timeStr(now);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

async function search() {
  const btn = document.getElementById('btn-search');
  btn.disabled = true; btn.textContent = '조회 중...';
  document.getElementById('table-wrap').innerHTML = '<div class="loading">⏳ 클러스터 조회 중...</div>';

  const v = id => document.getElementById(id).value.trim();
  const params = new URLSearchParams();

  const conds = getConditions();
  if (conds.length) params.set('conditions', JSON.stringify(conds));
  if (v('f-qtype'))   params.set('query_type', v('f-qtype'));

  const fromDate = v('f-from-date'), fromTime = v('f-from-time');
  const toDate   = v('f-to-date'),   toTime   = v('f-to-time');
  if (fromDate) params.set('from_time', new Date(`${fromDate}T${fromTime || '00:00'}`).toISOString());
  if (toDate)   params.set('to_time',   new Date(`${toDate}T${toTime || '23:59'}`).toISOString());

  const selectedCluster = v('f-cluster');
  if (selectedCluster) params.set('clusters', selectedCluster);

  params.set('limit', v('f-limit') || '100');

  try {
    const res  = await fetch(`/api/queries?${params}`);
    const data = await res.json();
    _allRows  = data.queries || [];
    _openRows = new Set();
    _activeState = '';
    selectStateTab(document.querySelector('#state-tabs .cluster-tab[data-state=""]'));

    // 드롭다운 선택 클러스터에 맞는 탭 자동 활성화
    const targetTab = selectedCluster
      ? document.querySelector(`#cluster-tabs .cluster-tab[data-cluster="${selectedCluster}"]`)
      : document.querySelector('#cluster-tabs .cluster-tab[data-cluster=""]');
    if (targetTab) selectTab(targetTab);
    else applyTabFilter();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '검색';
  }
}

function reset() {
  document.getElementById('f-user').value = '';
  document.getElementById('cond-area').innerHTML = '';
  _condCount = 0;
  addCond();
  ['f-from-date','f-from-time','f-to-date','f-to-time'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-qtype').value = 'QUERY';
  document.getElementById('f-cluster').value = '';
  setPreset(1, document.querySelector('.preset-btn'));
  document.getElementById('table-wrap').innerHTML = '<div class="empty">검색 조건을 입력하고 검색하세요</div>';
  _allRows = []; _rows = []; _openRows = new Set(); _activeCluster = ''; _activeState = ''; _page = 0;
  document.querySelectorAll('#state-tabs .cluster-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('#state-tabs .cluster-tab[data-state=""]').classList.add('active');
  document.querySelectorAll('#cluster-tabs .cluster-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('#cluster-tabs .cluster-tab[data-cluster=""]').classList.add('active');
  updateTabCounts();
  updateTabSummary();
  document.getElementById('pagination').innerHTML = '';
}

function sortBy(col) {
  if (_sortCol === col) _sortDir *= -1;
  else { _sortCol = col; _sortDir = -1; }
  _rows.sort((a, b) => {
    const va = a[col] ?? '', vb = b[col] ?? '';
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * _sortDir;
    return va < vb ? -_sortDir : va > vb ? _sortDir : 0;
  });
  _page = 0;
  renderTable(_rows);
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">결과가 없습니다</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(rows.length / PAGE_SIZE);
  if (_page >= totalPages) _page = totalPages - 1;
  const start     = _page * PAGE_SIZE;
  const pageRows  = rows.slice(start, start + PAGE_SIZE);
  const colCount  = COLS.length;

  const thead = '<thead><tr>' + COLS.map(c => {
    if (!c.sort) return `<th class="no-sort">${c.label}</th>`;
    const cls = ['sortable', _sortCol === c.key ? (_sortDir === 1 ? 'sort-asc' : 'sort-desc') : ''].join(' ').trim();
    return `<th class="${cls}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join('') + '</tr></thead>';

  const tbody = pageRows.map((q, localIdx) => {
    const i        = start + localIdx; // _rows 전체 기준 인덱스
    const stmt     = q.statement                ?? '';
    const errMsg   = q.attributes?.query_status ?? '';
    const connUser = q.attributes?.connected_user ?? '';

    const cells = COLS.map(c => {
      const val = q[c.key] ?? '';
      if (c.key === '_toggle')
        return `<td class="c-toggle">
          <button class="toggle-btn" id="tbtn-${i}" onclick="toggleDetail(${i})" title="펼치기">▶</button>
        </td>`;
      if (c.key === '_connected_user')
        return `<td class="c-conn-user">${esc(connUser)}</td>`;
      if (c.key === 'queryState')
        return `<td><span class="s s-${val}">${val}</span></td>`;
      if (c.key === 'durationMillis')
        return `<td class="c-dur">${fmtDur(val)}</td>`;
      if (c.key === 'rowsProduced')
        return `<td class="c-rows">${val !== '' ? Number(val).toLocaleString() : '-'}</td>`;
      if (c.key === 'startTime' || c.key === 'endTime')
        return `<td class="c-time">${fmtTime(val)}</td>`;
      if (c.key === 'statement') {
        return `<td class="c-stmt"><span class="stmt-text">${esc(stmt)}</span></td>`;
      }
      if (c.key === 'queryStatus') {
        const v = esc(errMsg);
        return `<td class="c-qstatus" title="${v}">${v}</td>`;
      }
      return `<td class="${c.cls}">${esc(String(val))}</td>`;
    }).join('');

    // detail-wrap은 빈 상태로 두고 클릭 시 lazy 렌더링
    const detailRow = `<tr class="detail-row" id="drow-${i}" style="display:none;">
      <td colspan="${colCount}"><div class="detail-wrap" id="dwrap-${i}"></div></td>
    </tr>`;

    return `<tr class="data-row">${cells}</tr>${detailRow}`;
  }).join('');

  document.getElementById('table-wrap').innerHTML =
    `<table>${thead}<tbody>${tbody}</tbody></table>`;

  // 열려있던 행 복원 (현재 페이지 범위만)
  pageRows.forEach((q, localIdx) => {
    const i = start + localIdx;
    if (_openRows.has(q.queryId)) {
      _fillDetail(i, q);
      const row = document.getElementById(`drow-${i}`);
      const btn = document.getElementById(`tbtn-${i}`);
      if (row) { row.style.display = ''; btn.textContent = '▼'; btn.classList.add('open'); }
    }
  });

  // 페이지네이션 컨트롤
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  const from = start + 1;
  const to   = Math.min(start + PAGE_SIZE, rows.length);
  pag.innerHTML = `
    <button class="page-btn" onclick="goPage(${_page - 1})" ${_page === 0 ? 'disabled' : ''}>‹ 이전</button>
    <span class="page-info">${from}–${to} / ${rows.length}건 &nbsp;(${_page + 1} / ${totalPages}페이지)</span>
    <button class="page-btn" onclick="goPage(${_page + 1})" ${_page >= totalPages - 1 ? 'disabled' : ''}>다음 ›</button>
  `;
}

function goPage(n) {
  _page = n;
  renderTable(_rows);
  document.getElementById('table-wrap').scrollTop = 0;
}

function _fillDetail(i, q) {
  const wrap = document.getElementById(`dwrap-${i}`);
  if (!wrap || wrap.hasChildNodes()) return; // 이미 채워진 경우 스킵
  const stmt   = q.statement                ?? '';
  const errMsg = q.attributes?.query_status ?? '';
  let html = `<div class="sql-block">${esc(stmt)}</div>`;
  if (errMsg) html += `<div class="${errMsg.trim() === 'OK' ? 'ok-block' : 'err-block'}">${esc(errMsg)}</div>`;
  wrap.innerHTML = html;
}

function toggleDetail(i) {
  const row = document.getElementById(`drow-${i}`);
  const btn = document.getElementById(`tbtn-${i}`);
  const open = row.style.display === 'none';
  if (open) _fillDetail(i, _rows[i]); // 열 때만 lazy 렌더링
  row.style.display = open ? '' : 'none';
  btn.textContent   = open ? '▼' : '▶';
  btn.classList.toggle('open', open);
  const qid = _rows[i]?.queryId;
  if (qid) { if (open) _openRows.add(qid); else _openRows.delete(qid); }
}

function fmtDur(ms) {
  if (ms == null || ms === '') return '-';
  if (ms < 1000)  return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return Math.floor(ms / 60000) + 'm ' + Math.floor((ms % 60000) / 1000) + 's';
}
const _dtFmt = new Intl.DateTimeFormat('ko-KR', { hour12: false,
  year: 'numeric', month: '2-digit', day: '2-digit',
  hour: '2-digit', minute: '2-digit', second: '2-digit' });
function fmtTime(iso) {
  if (!iso) return '-';
  try { return _dtFmt.format(new Date(iso)); } catch { return iso; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter 키: 필터 입력 필드 포커스 중일 때만 검색
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.closest('.filters')) search();
});
</script>
