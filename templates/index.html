<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Query Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; font-size: 13px; }

  header { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 10px 20px; }
  header h1 { font-size: 15px; color: #7eb8f7; }

  /* ── 필터 패널 ── */
  .filters {
    background: #13161f; border-bottom: 1px solid #2a2d3e;
    padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  }
  .fg { display: flex; flex-direction: column; gap: 3px; }
  .fg label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }
  .fg input[type="text"],
  .fg input[type="datetime-local"],
  .fg select {
    background: #1e2130; border: 1px solid #2e3148; color: #e0e0e0;
    padding: 5px 8px; border-radius: 4px; font-size: 12px; height: 30px;
  }
  .fg input[type="text"] { min-width: 150px; }
  .fg input[type="datetime-local"] { min-width: 172px; color-scheme: dark; }
  .fg input:focus, .fg select:focus { outline: none; border-color: #5b7fe0; }

  .presets { display: flex; gap: 4px; }
  .preset-btn {
    padding: 4px 8px; border: 1px solid #2e3148; border-radius: 4px;
    background: #1e2130; color: #aaa; font-size: 11px; cursor: pointer;
  }
  .preset-btn:hover, .preset-btn.active { background: #3d5afe; color: #fff; border-color: #3d5afe; }

  .state-checks { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 2px; }
  .state-checks label { display: flex; align-items: center; gap: 3px; font-size: 12px; cursor: pointer; }
  .state-checks input[type="checkbox"] { accent-color: #3d5afe; cursor: pointer; }

  .btn { padding: 5px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; height: 30px; }
  .btn-primary   { background: #3d5afe; color: #fff; }
  .btn-primary:hover { background: #536dfe; }
  .btn-secondary { background: #2a2d3e; color: #aaa; }
  .btn-secondary:hover { background: #363a52; }
  .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

  /* ── 클러스터 탭 ── */
  .cluster-tabs {
    background: #0d0f16; border-bottom: 1px solid #2a2d3e;
    padding: 0 20px; display: flex; gap: 0; overflow-x: auto;
  }
  .cluster-tab {
    padding: 8px 16px; font-size: 12px; font-weight: 500; color: #555;
    cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: color .15s; display: flex; align-items: center; gap: 6px;
  }
  .cluster-tab:hover { color: #aaa; }
  .cluster-tab.active { color: #7eb8f7; border-bottom-color: #7eb8f7; }
  .tab-count { font-size: 10px; background: #1e2130; color: #666; padding: 1px 6px; border-radius: 8px; }
  .cluster-tab.active .tab-count { background: #1a2a4a; color: #7eb8f7; }

  /* ── 상태 바 ── */
  .status-bar {
    background: #0d0f16; border-bottom: 1px solid #1e2130;
    padding: 5px 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; min-height: 30px;
  }
  .cl-badge { padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-ok  { background: #1b5e2066; color: #66bb6a; border: 1px solid #2e7d32; }
  .badge-err { background: #b71c1c66; color: #ef9a9a; border: 1px solid #c62828; }
  .summary    { margin-left: auto; font-size: 11px; color: #888; }
  .filter-tag { font-family: monospace; font-size: 11px; color: #ffa726; }

  /* ── 테이블 ── */
  .table-wrap { overflow: auto; height: calc(100vh - 225px); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #13161f; color: #888; text-align: left;
    padding: 7px 12px; border-bottom: 2px solid #2a2d3e;
    position: sticky; top: 0; white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: #bbb; }
  thead th.no-sort { cursor: default; }
  thead th.no-sort:hover { color: #888; }
  .sort-asc::after  { content: ' ▲'; font-size: 10px; }
  .sort-desc::after { content: ' ▼'; font-size: 10px; }

  tbody tr.data-row { border-bottom: 1px solid #1a1d2e; cursor: pointer; }
  tbody tr.data-row:hover { background: #1c2035; }
  tbody td { padding: 6px 12px; }

  .c-cluster { color: #7eb8f7; font-weight: 500; }
  .c-user    { color: #ce93d8; }
  .c-dur     { text-align: right; white-space: nowrap; }
  .c-time    { white-space: nowrap; color: #888; }

  .c-stmt { max-width: 380px; }
  .c-stmt-inner { display: flex; align-items: center; gap: 5px; white-space: nowrap; overflow: hidden; }
  .toggle-btn {
    flex-shrink: 0; background: none; border: 1px solid #2e3148; color: #666;
    cursor: pointer; font-size: 10px; padding: 1px 5px; border-radius: 3px; line-height: 1.4;
  }
  .toggle-btn:hover { color: #aaa; border-color: #5b7fe0; }
  .toggle-btn.open  { color: #7eb8f7; border-color: #7eb8f7; }
  .stmt-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: monospace; font-size: 12px; color: #ccc;
  }

  .s { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .s-FINISHED  { background: #1b5e2066; color: #66bb6a; border: 1px solid #2e7d32; }
  .s-EXCEPTION { background: #b71c1c66; color: #ef9a9a; border: 1px solid #c62828; }
  .s-RUNNING   { background: #0d47a166; color: #90caf9; border: 1px solid #1565c0; }
  .s-QUEUED    { background: #e65100aa; color: #ffcc02; border: 1px solid #e65100; }

  /* ── SQL 펼침 / 에러 행 ── */
  tr.detail-row td { background: #0d0f16; padding: 0; border-bottom: 2px solid #2a2d3e; }
  .detail-wrap { padding: 10px 16px; }
  .sql-block {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #a8d8a8; white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    max-height: 260px; overflow-y: auto;
    background: #080a0f; border: 1px solid #1e2130; border-radius: 4px; padding: 10px 12px;
  }
  tr.error-row td { background: #120808; padding: 0; border-bottom: 1px solid #2a1515; }
  .err-block {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #ef9a9a; white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    max-height: 120px; overflow-y: auto;
    background: #1a0a0a; border: 1px solid #c6282866; border-radius: 4px;
    padding: 8px 12px; margin: 6px 16px;
  }

  .empty   { text-align: center; padding: 60px; color: #555; }
  .loading { text-align: center; padding: 60px; color: #7eb8f7; }

  /* ── 상세보기 모달 ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: #000b; z-index: 200;
    align-items: flex-start; justify-content: center; padding-top: 60px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #1a1d2e; border: 1px solid #2e3148; border-radius: 8px;
    width: 860px; max-width: 95vw; max-height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 20px 60px #0008;
  }
  .modal-header {
    padding: 14px 20px; border-bottom: 1px solid #2e3148;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .modal-header h2 { font-size: 13px; color: #7eb8f7; font-weight: 600; }
  .modal-close { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: #fff; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

  .detail-grid {
    display: grid; grid-template-columns: 130px 1fr 130px 1fr;
    gap: 6px 16px; margin-bottom: 16px;
  }
  .dg-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.4px; display: flex; align-items: center; }
  .dg-value { font-size: 12px; color: #ddd; word-break: break-all; display: flex; align-items: center; }
  .dg-full  { grid-column: 1 / -1; }

  .modal-section-title {
    font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: 0.5px; margin: 14px 0 6px; border-top: 1px solid #2a2d3e; padding-top: 12px;
  }
  .modal-sql {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #a8d8a8; white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    background: #080a0f; border: 1px solid #1e2130; border-radius: 4px;
    padding: 12px; max-height: 300px; overflow-y: auto;
  }
  .modal-err {
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    color: #ef9a9a; white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    background: #1a0a0a; border: 1px solid #c6282866; border-radius: 4px;
    padding: 12px; max-height: 200px; overflow-y: auto;
  }
</style>
</head>
<body>

<header><h1>⚡ Query Explorer</h1></header>

<div class="filters">
  <div class="fg">
    <label>User</label>
    <input id="f-user" type="text" placeholder="username">
  </div>
  <div class="fg">
    <label>Keyword</label>
    <input id="f-keyword" type="text" placeholder="table, db.table, SQL 키워드 등">
  </div>
  <div class="fg">
    <label>상태</label>
    <div class="state-checks">
      <label><input type="checkbox" class="f-state" value="FINISHED"  checked> <span class="s s-FINISHED">FINISHED</span></label>
      <label><input type="checkbox" class="f-state" value="RUNNING"   checked> <span class="s s-RUNNING">RUNNING</span></label>
      <label><input type="checkbox" class="f-state" value="EXCEPTION" checked> <span class="s s-EXCEPTION">EXCEPTION</span></label>
      <label><input type="checkbox" class="f-state" value="QUEUED"    checked> <span class="s s-QUEUED">QUEUED</span></label>
    </div>
  </div>
  <div class="fg">
    <label>빠른 범위</label>
    <div class="presets">
      <button class="preset-btn active" onclick="setPreset(1,this)">1h</button>
      <button class="preset-btn" onclick="setPreset(6,this)">6h</button>
      <button class="preset-btn" onclick="setPreset(24,this)">24h</button>
      <button class="preset-btn" onclick="setPreset(72,this)">3d</button>
      <button class="preset-btn" onclick="setPreset(168,this)">7d</button>
    </div>
  </div>
  <div class="fg">
    <label>시작 일시</label>
    <input id="f-from" type="datetime-local">
  </div>
  <div class="fg">
    <label>종료 일시</label>
    <input id="f-to" type="datetime-local">
  </div>
  <div class="fg">
    <label>결과 수</label>
    <select id="f-limit">
      <option value="100">100건</option>
      <option value="300">300건</option>
      <option value="500">500건</option>
      <option value="1000" selected>1000건</option>
    </select>
  </div>
  <div class="fg" style="justify-content:flex-end">
    <label>&nbsp;</label>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-primary" id="btn-search" onclick="search()">검색</button>
      <button class="btn btn-secondary" onclick="reset()">초기화</button>
    </div>
  </div>
</div>

<div class="cluster-tabs" id="cluster-tabs">
  <div class="cluster-tab active" data-cluster="" onclick="selectTab(this)">
    전체 <span class="tab-count" id="tab-count-all">0</span>
  </div>
</div>

<div class="status-bar" id="status-bar">
  <span style="color:#555">검색 조건을 입력하고 검색하세요</span>
</div>

<div class="table-wrap" id="table-wrap">
  <div class="empty">검색 조건을 입력하고 검색하세요</div>
</div>

<!-- 상세보기 모달 -->
<div class="modal-backdrop" id="modal-backdrop" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Query Detail</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let _allRows       = [];
let _rows          = [];
let _sortCol       = 'startTime';
let _sortDir       = -1;
let _activeCluster = '';

const COLS = [
  { key: '_cluster',       label: '클러스터', cls: 'c-cluster', sort: true  },
  { key: 'user',           label: '사용자',   cls: 'c-user',    sort: true  },
  { key: 'queryState',     label: '상태',     cls: '',          sort: true  },
  { key: 'statement',      label: 'Statement',cls: 'c-stmt',    sort: false },
  { key: 'durationMillis', label: '실행시간', cls: 'c-dur',     sort: true  },
  { key: 'startTime',      label: '시작시간', cls: 'c-time',    sort: true  },
  { key: 'endTime',        label: '종료시간', cls: 'c-time',    sort: true  },
];

// ── 초기화 ────────────────────────────────────────────────────────────────────
window.onload = () => {
  setPreset(1, document.querySelector('.preset-btn.active'));
  loadClusters();
};

async function loadClusters() {
  try {
    const res  = await fetch('/api/clusters');
    const data = await res.json();
    const tabs = document.getElementById('cluster-tabs');
    data.clusters.forEach(c => {
      const div = document.createElement('div');
      div.className       = 'cluster-tab';
      div.dataset.cluster = c;
      div.innerHTML       = `${c} <span class="tab-count" id="tab-count-${c}">0</span>`;
      div.onclick         = () => selectTab(div);
      tabs.appendChild(div);
    });
  } catch(e) {}
}

function selectTab(el) {
  document.querySelectorAll('.cluster-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _activeCluster = el.dataset.cluster;
  applyTabFilter();
}

function applyTabFilter() {
  _rows = _activeCluster
    ? _allRows.filter(q => q._cluster === _activeCluster)
    : [..._allRows];
  renderTable(_rows);
  updateStatusSummary();
}

function updateTabCounts() {
  document.getElementById('tab-count-all').textContent = _allRows.length;
  document.querySelectorAll('.cluster-tab[data-cluster]').forEach(tab => {
    const c  = tab.dataset.cluster;
    if (!c) return;
    const el = document.getElementById(`tab-count-${c}`);
    if (el) el.textContent = _allRows.filter(q => q._cluster === c).length;
  });
}

// ── 프리셋 ────────────────────────────────────────────────────────────────────
function setPreset(hours, btn) {
  const now  = new Date();
  const from = new Date(now - hours * 3600000);
  document.getElementById('f-from').value = toLocalDT(from);
  document.getElementById('f-to').value   = toLocalDT(now);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function toLocalDT(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ── 검색 ─────────────────────────────────────────────────────────────────────
async function search() {
  const btn = document.getElementById('btn-search');
  btn.disabled = true; btn.textContent = '조회 중...';
  document.getElementById('table-wrap').innerHTML = '<div class="loading">⏳ 클러스터 조회 중...</div>';

  const v = id => document.getElementById(id).value.trim();
  const params = new URLSearchParams();

  if (v('f-user'))    params.set('user',    v('f-user'));
  if (v('f-keyword')) params.set('keyword', v('f-keyword'));

  const checkedStates = [...document.querySelectorAll('.f-state:checked')].map(c => c.value);
  const allStates     = [...document.querySelectorAll('.f-state')].map(c => c.value);
  if (checkedStates.length > 0 && checkedStates.length < allStates.length)
    params.set('query_state', checkedStates.join(','));

  if (v('f-from')) params.set('from_time', new Date(v('f-from')).toISOString());
  if (v('f-to'))   params.set('to_time',   new Date(v('f-to')).toISOString());
  params.set('limit', v('f-limit') || '1000');

  try {
    const res  = await fetch(`/api/queries?${params}`);
    const data = await res.json();
    _allRows = data.queries || [];
    updateTabCounts();
    applyTabFilter();
    renderStatusBar(data);
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '검색';
  }
}

function reset() {
  ['f-user','f-keyword','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.f-state').forEach(c => c.checked = true);
  setPreset(1, document.querySelector('.preset-btn'));
  selectTab(document.querySelector('.cluster-tab[data-cluster=""]'));
  document.getElementById('status-bar').innerHTML = '<span style="color:#555">검색 조건을 입력하고 검색하세요</span>';
  document.getElementById('table-wrap').innerHTML  = '<div class="empty">검색 조건을 입력하고 검색하세요</div>';
  _allRows = []; _rows = [];
  updateTabCounts();
}

// ── 정렬 ─────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (_sortCol === col) _sortDir *= -1;
  else { _sortCol = col; _sortDir = -1; }
  _rows.sort((a, b) => {
    const va = a[col] ?? '', vb = b[col] ?? '';
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * _sortDir;
    return va < vb ? -_sortDir : va > vb ? _sortDir : 0;
  });
  renderTable(_rows);
}

// ── 렌더링 ────────────────────────────────────────────────────────────────────
function renderStatusBar(data) {
  const badges = (data.cluster_results || []).map(c => {
    const cls = c.error ? 'badge-err' : 'badge-ok';
    const tip = c.error ? c.error : `${c.count}건`;
    return `<span class="cl-badge ${cls}">${c.cluster} (${tip})</span>`;
  }).join('');
  const tag = data.filter_applied
    ? `<span class="filter-tag">filter: ${data.filter_applied}</span>` : '';
  document.getElementById('status-bar').innerHTML =
    badges + tag + `<span class="summary" id="status-summary">총 ${_allRows.length}건</span>`;
}

function updateStatusSummary() {
  const el = document.getElementById('status-summary');
  if (el) el.textContent = _activeCluster
    ? `${_activeCluster}: ${_rows.length}건 / 전체 ${_allRows.length}건`
    : `총 ${_allRows.length}건`;
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">결과가 없습니다</div>';
    return;
  }

  const colCount = COLS.length;
  const thead = '<thead><tr>' + COLS.map(c => {
    if (!c.sort) return `<th class="no-sort">${c.label}</th>`;
    const cls = _sortCol === c.key ? (_sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join('') + '</tr></thead>';

  const tbody = rows.map((q, i) => {
    const stmt        = q.statement   ?? '';
    const errMsg      = q.queryStatus ?? '';
    const isException = q.queryState  === 'EXCEPTION';

    const cells = COLS.map(c => {
      const val = q[c.key] ?? '';
      if (c.key === 'queryState')
        return `<td><span class="s s-${val}">${val}</span></td>`;
      if (c.key === 'durationMillis')
        return `<td class="c-dur">${fmtDur(val)}</td>`;
      if (c.key === 'startTime' || c.key === 'endTime')
        return `<td class="c-time">${fmtTime(val)}</td>`;
      if (c.key === 'statement')
        return `<td class="c-stmt">
          <div class="c-stmt-inner">
            <button class="toggle-btn" id="tbtn-${i}"
              onclick="event.stopPropagation(); toggleDetail(${i})" title="SQL 펼치기">▶</button>
            <span class="stmt-text" title="${esc(stmt)}">${esc(stmt)}</span>
          </div>
        </td>`;
      return `<td class="${c.cls}">${esc(String(val))}</td>`;
    }).join('');

    const detailRow = `<tr class="detail-row" id="drow-${i}" style="display:none;">
      <td colspan="${colCount}">
        <div class="detail-wrap">
          <div class="sql-block">${esc(stmt)}</div>
        </div>
      </td>
    </tr>`;

    const errorRow = isException && errMsg
      ? `<tr class="error-row">
          <td colspan="${colCount}">
            <div class="err-block">${esc(errMsg)}</div>
          </td>
        </tr>`
      : '';

    return `<tr class="data-row" onclick="openDetail(${i})">${cells}</tr>${detailRow}${errorRow}`;
  }).join('');

  document.getElementById('table-wrap').innerHTML =
    `<table>${thead}<tbody>${tbody}</tbody></table>`;
}

function toggleDetail(i) {
  const row = document.getElementById(`drow-${i}`);
  const btn = document.getElementById(`tbtn-${i}`);
  const open = row.style.display === 'none';
  row.style.display = open ? '' : 'none';
  btn.textContent   = open ? '▼' : '▶';
  btn.classList.toggle('open', open);
}

// ── 상세보기 모달 ─────────────────────────────────────────────────────────────
function openDetail(i) {
  const q = _rows[i];
  if (!q) return;

  document.getElementById('modal-title').textContent =
    `Query Detail — ${q._cluster ?? ''} / ${q.user ?? ''}`;

  const fields = [
    ['Query ID',   q.queryId        ?? '-'],
    ['클러스터',   q._cluster       ?? '-'],
    ['사용자',     q.user           ?? '-'],
    ['상태',       `<span class="s s-${q.queryState}">${q.queryState ?? '-'}</span>`],
    ['Database',   q.database       ?? '-'],
    ['시작 시간',  fmtTime(q.startTime)],
    ['종료 시간',  fmtTime(q.endTime)],
    ['실행 시간',  fmtDur(q.durationMillis)],
    ['메모리',     fmtBytes(q.memoryAggregate)],
    ['읽은 행',    q.rowsProduced    != null ? q.rowsProduced.toLocaleString()    : '-'],
    ['HDFS 읽기',  fmtBytes(q.hdfsBytesRead)],
    ['Coordinator',q.coordinator?.hostId ?? '-'],
  ];

  const grid = fields.map(([l, v]) =>
    `<div class="dg-label">${l}</div><div class="dg-value">${v}</div>`
  ).join('');

  const sqlSection = q.statement
    ? `<div class="modal-section-title">SQL Statement</div>
       <div class="modal-sql">${esc(q.statement)}</div>`
    : '';

  const errSection = q.queryState === 'EXCEPTION' && q.queryStatus
    ? `<div class="modal-section-title" style="color:#ef5350">Error Message</div>
       <div class="modal-err">${esc(q.queryStatus)}</div>`
    : '';

  document.getElementById('modal-body').innerHTML =
    `<div class="detail-grid">${grid}</div>${sqlSection}${errSection}`;

  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function fmtDur(ms) {
  if (ms == null || ms === '') return '-';
  if (ms < 1000)  return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return Math.floor(ms / 60000) + 'm ' + Math.floor((ms % 60000) / 1000) + 's';
}
function fmtTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('ko-KR', { hour12: false });
}
function fmtBytes(b) {
  if (b == null) return '-';
  if (b < 1024)        return b + ' B';
  if (b < 1048576)     return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824)  return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  else if (e.key === 'Enter' && !document.getElementById('modal-backdrop').classList.contains('open')) search();
});
</script>
